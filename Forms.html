<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        
</head>
<body>
    <form action="Thanks For Applying" method="post" autocomplete="on">
        <h2>Course Registration Form</h2>
        <fieldset>
            <legend>user details</legend>
        <table>
            <tr>
                <td><label for="">First Name </label></td>
                <td><input type="text" placeholder="ex:chandra"></td>
            </tr>
        

            <tr>
                <td><label for="">Surname</label></td>
                <td><input type="text" placeholder="shaik"></td>
            </tr>
        

            <tr>
                <td><label for="">Mobile Number</label></td>
                <td><input type="tel" placeholder="9392713452"></td>
            </tr>
        

            <tr>
                <td><label for="">Email</label></td>
                <td><input type="email" placeholder="krishna@gmail.com"></td>
            </tr>
        

            <tr>
                <td><label for="">Passord</label></td>
                <td><input type="password"></td>
            </tr>
        
        
            <tr>
                <td><label for="">Confirm password</label></td>
                <td><input type="password"></td>
            </tr>
        
        
            
            <tr>
                <td><label for="">Date_of_birth</label></td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>
                    <label for="">Gender</label>

                <td><input type="radio" name="gender">
                <label for="">Male </label>

                <input type="radio" name="gender">
                <label for="">Female</label>

                <input type="radio" name="gender">
                <label for="">Others</label>
            </td>
            </tr>
        
        
        <tr>
            <td>
        <label for="">select country</label>
        <td>
            <select name="" id="">
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UAE">UAE</option>
                    <option value="south Africa">South Africa</option>
        </td>
            </td>
                
       
            </tr>

            <tr>
                <td>
                    <label>Upload Picture</label> 
                </td>
                <td>
                    <input type="file">
                </td>
                
            </tr>
            <tr>
                <td>
                    <input type="reset">
                </td>
            </tr>
        
        
        </table>
        </fieldset>

        <fieldset>
        <legend>course details</legend>
            <table>

                <tr>
                    <td><label for="">Select Course</label>
                    <td>
                        <select name="" id="">
                            <option value="">Java Full Stack</option>
                            <option value="">Python Full Stack</option>
                            <option value="">Data Science</option>
                            <option value="">Devops</option>
                        </select>
                    </td>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Delivery Mode</label>
                        <td>
                            <input type="radio" name="mode">
                            <label for="">Online</label>
                            <input type="radio" name="mode">
                            <label for="">Offline</label>
                        </td>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Institute Name</label>
                        <td>
                            <input type="text" placeholder="Thopstech">
                        </td>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Comments</label>
                        <td>
                            <textarea name="" rows="6" cols="40" id=""></textarea>
                        </td>
                    </td>
                    
                    
                </tr>
                
             
            </table>

        </fieldset>
<br>

        <button type="submit">Submit</button>



    </form>
</body>
</html>
